<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cursor Office — Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #officeCanvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
    #controls {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    #controls button {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      font: bold 12px monospace;
      cursor: pointer;
      color: #fff;
      transition: opacity 0.15s;
    }
    #controls button:hover { opacity: 0.85; }
    #controls button.active { outline: 2px solid #fff; outline-offset: 2px; }
    .btn-idle { background: #555; }
    .btn-work { background: #2266cc; }
    .btn-phone { background: #22aa55; }
    .btn-celebrate { background: #cc8822; }
    .btn-error { background: #cc2244; }
  </style>
</head>
<body>
  <canvas id="officeCanvas"></canvas>
  <div id="controls">
    <button class="btn-idle active" onclick="sendActivity('idle', this)">Idle</button>
    <button class="btn-work" onclick="sendActivity('typing', this)">Working</button>
    <button class="btn-phone" onclick="sendActivity('phoning', this)">Phone Call</button>
    <button class="btn-celebrate" onclick="sendActivity('celebrating', this)">Celebrate</button>
    <button class="btn-error" onclick="sendActivity('error', this)">Error</button>
  </div>
  <script>
    function acquireVsCodeApi() {
      return { postMessage: function(){}, getState: function(){return null;}, setState: function(){} };
    }
    function sendActivity(activity, btn) {
      document.querySelectorAll('#controls button').forEach(function(b) { b.classList.remove('active'); });
      if (btn) btn.classList.add('active');
      window.postMessage({ type: 'agentStatus', activity: activity }, '*');
    }
  </script>
  <script src="../dist/webview.js"></script>
</body>
</html>
